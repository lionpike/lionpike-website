<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Contact | Lion Pike</title>

<meta name="description" content="Get in touch with Lion Pike &mdash; manufacturing data analytics for ERP systems.">
<meta name="robots" content="index, follow">
<link rel="icon" href="/favicon.ico">
<link rel="stylesheet" href="/styles.css">

<style>
main { flex: 1; padding: 5rem 0; max-width: 560px; }
h1 { font-size: clamp(1.8rem, 4vw, 2.8rem); font-weight: 300; line-height: 1.2; margin-bottom: 0.75rem; }
.intro { color: rgba(244,241,235,0.6); margin-bottom: 3rem; font-size: 0.95rem; }
.form-group { margin-bottom: 1.5rem; }
label { display: block; font-size: 0.7rem; letter-spacing: 0.2em; text-transform: uppercase; color: #b8972a; margin-bottom: 0.4rem; }
input, textarea {
  width: 100%;
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(184,151,42,0.25);
  color: #f4f1eb;
  font-family: inherit;
  font-size: 0.95rem;
  padding: 0.75rem 1rem;
  outline: none;
  transition: border-color 0.2s;
  border-radius: 0;
  -webkit-appearance: none;
}
input:focus, textarea:focus { border-color: rgba(184,151,42,0.7); }
textarea { resize: vertical; min-height: 140px; }
button[type="submit"] {
  background: transparent;
  border: 1px solid rgba(184,151,42,0.6);
  color: #b8972a;
  font-family: inherit;
  font-size: 0.75rem;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  padding: 0.75rem 2rem;
  cursor: pointer;
  transition: background 0.2s, color 0.2s;
  margin-top: 0.5rem;
}
button[type="submit"]:hover { background: rgba(184,151,42,0.1); color: #d4af4a; }
button[type="submit"]:disabled { opacity: 0.4; cursor: not-allowed; }
.form-status { margin-top: 1.5rem; font-size: 0.85rem; display: none; }
.form-status.success { color: #7db87d; display: block; }
.form-status.error { color: #c97070; display: block; }
.grecaptcha-badge { visibility: hidden; }
.recaptcha-note { margin-top: 1rem; font-size: 0.7rem; color: rgba(244,241,235,0.25); }
.recaptcha-note a { color: rgba(184,151,42,0.5); text-decoration: none; }
</style>

<!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-B6CK35S1XB"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag("js", new Date());
  gtag("config", "G-B6CK35S1XB");
</script>
</head>
<body>

<div class="top-bar"></div>
<div class="bg-mark">LP</div>

<div class="container">

  <header>
    <div class="header-inner">
      <a href="/"><img src="/logo.svg" alt="Lion Pike" style="height: 44px; display: block;"></a>
      <nav>
        <a href="/">Home</a>
        <span style="color: rgba(244,241,235,0.2); margin: 0 0.75rem;">/</span>
        <a href="/about.html">About</a>
        <span style="color: rgba(244,241,235,0.2); margin: 0 0.75rem;">/</span>
        <a href="/solutions.html">Solutions</a>
      </nav>
    </div>
  </header>

  <main>

    <div class="eyebrow">Get in Touch</div>

    <h1>Let&rsquo;s talk about your data.</h1>

    <p class="intro">
      Tell us a little about your operation and what you&rsquo;re trying to solve.
      We&rsquo;ll get back to you promptly.
    </p>

    <form id="contactForm" novalidate>

      <div class="form-group">
        <label for="name">Name</label>
        <input type="text" id="name" name="name" autocomplete="name" required>
      </div>

      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" autocomplete="email" required>
      </div>

      <div class="form-group">
        <label for="company">Company</label>
        <input type="text" id="company" name="company" autocomplete="organization">
      </div>

      <div class="form-group">
        <label for="message">Message</label>
        <textarea id="message" name="message" required></textarea>
      </div>

      <button type="submit" id="submitBtn">Send Message</button>

      <div class="form-status" id="formStatus"></div>

      <p class="recaptcha-note">
        Protected by reCAPTCHA &mdash;
        <a href="https://policies.google.com/privacy" target="_blank" rel="noopener">Privacy</a> &amp;
        <a href="https://policies.google.com/terms" target="_blank" rel="noopener">Terms</a>
      </p>

    </form>

  </main>

  <footer>
    <div>&copy; 2026 Lion Pike</div>
    <div class="footer-tagline">Data that works as hard as you do.</div>
  </footer>

</div>

<script src="https://www.google.com/recaptcha/api.js?render=6LcuEqAsAAAAAIHBlYIAJ-ZZ5wmfyiYrXDnUaUfd"></script>

<script>
  const FUNCTION_URL = "https://lionpike-contact-fn.azurewebsites.net/api/contact";
  const SITE_KEY = "6LcuEqAsAAAAAIHBlYIAJ-ZZ5wmfyiYrXDnUaUfd";

  document.getElementById("contactForm").addEventListener("submit", async function(e) {
    e.preventDefault();

    const btn    = document.getElementById("submitBtn");
    const status = document.getElementById("formStatus");

    const name    = document.getElementById("name").value.trim();
    const email   = document.getElementById("email").value.trim();
    const company = document.getElementById("company").value.trim();
    const message = document.getElementById("message").value.trim();

    if (!name || !email || !message) {
      status.className = "form-status error";
      status.textContent = "Please fill in all required fields.";
      return;
    }

    btn.disabled = true;
    btn.textContent = "Sending\u2026";
    status.className = "form-status";
    status.textContent = "";

    try {
      const token = await grecaptcha.execute(SITE_KEY, { action: "contact" });

      const response = await fetch(FUNCTION_URL, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ name, email, company, message, recaptcha_token: token }),
      });

      if (response.ok) {
        status.className = "form-status success";
        status.textContent = "Message sent \u2014 we\u2019ll be in touch shortly.";
        document.getElementById("contactForm").reset();
      } else {
        throw new Error("Server error");
      }
    } catch (err) {
      status.className = "form-status error";
      status.textContent = "Something went wrong. Please try again or email info@lionpike.com directly.";
    } finally {
      btn.disabled = false;
      btn.textContent = "Send Message";
    }
  });
</script>

</body>
</html>
