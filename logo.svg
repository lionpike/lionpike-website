<svg xmlns="http://www.w3.org/2000/svg" width="340" height="90" viewBox="0 0 340 90" role="img">
  <title>Lion Pike</title>
  <desc>Lion Pike logo — line-art lion head in a circle with geometric wordmark</desc>

  <!-- Circle mark -->
  <circle cx="45" cy="45" r="31" fill="none" stroke="#C9A84C" stroke-width="1.2"/>

  <!-- Mane ring -->
  <circle cx="45" cy="44" r="22" fill="none" stroke="#C9A84C" stroke-width="0.8"/>

  <!-- Mane tick marks -->
  <line x1="45" y1="22" x2="45" y2="26" stroke="#C9A84C" stroke-width="0.9"/>
  <line x1="58" y1="26" x2="55" y2="29" stroke="#C9A84C" stroke-width="0.9"/>
  <line x1="65" y1="37" x2="62" y2="38" stroke="#C9A84C" stroke-width="0.9"/>
  <line x1="67" y1="49" x2="64" y2="49" stroke="#C9A84C" stroke-width="0.9"/>
  <line x1="62" y1="60" x2="59" y2="57" stroke="#C9A84C" stroke-width="0.9"/>
  <line x1="32" y1="26" x2="35" y2="29" stroke="#C9A84C" stroke-width="0.9"/>
  <line x1="25" y1="37" x2="28" y2="38" stroke="#C9A84C" stroke-width="0.9"/>
  <line x1="23" y1="49" x2="26" y2="49" stroke="#C9A84C" stroke-width="0.9"/>
  <line x1="28" y1="60" x2="31" y2="57" stroke="#C9A84C" stroke-width="0.9"/>

  <!-- Face oval -->
  <ellipse cx="45" cy="45" rx="13" ry="15" fill="none" stroke="#C9A84C" stroke-width="0.8"/>

  <!-- Eyes -->
  <ellipse cx="40" cy="41" rx="2.5" ry="2" fill="none" stroke="#C9A84C" stroke-width="0.8"/>
  <ellipse cx="50" cy="41" rx="2.5" ry="2" fill="none" stroke="#C9A84C" stroke-width="0.8"/>
  <circle cx="40" cy="41.5" r="1" fill="#C9A84C"/>
  <circle cx="50" cy="41.5" r="1" fill="#C9A84C"/>

  <!-- Brow -->
  <path d="M37.5 38.5 L42 39.5" fill="none" stroke="#C9A84C" stroke-width="0.8"/>
  <path d="M48 39.5 L52.5 38.5" fill="none" stroke="#C9A84C" stroke-width="0.8"/>

  <!-- Nose -->
  <path d="M43 47.5 L45 49 L47 47.5 Z" fill="none" stroke="#C9A84C" stroke-width="0.8"/>

  <!-- Mouth -->
  <path d="M43.5 49.5 Q45 52 46.5 49.5" fill="none" stroke="#C9A84C" stroke-width="0.8"/>

  <!-- Forehead cross -->
  <line x1="45" y1="33" x2="45" y2="37" stroke="#C9A84C" stroke-width="0.8"/>
  <line x1="43" y1="35" x2="47" y2="35" stroke="#C9A84C" stroke-width="0.8"/>

  <!-- Wordmark — geometric spaced caps -->
  <text
    x="88" y="56"
    font-family="'Courier New', Courier, monospace"
    font-size="28"
    font-weight="700"
    fill="#C9A84C"
    letter-spacing="6"
  >LION PIKE</text>

</svg>
