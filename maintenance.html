<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lion Pike — Back Soon</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0f1923;
      color: #f0f0f0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 24px;
    }

    .badge {
      font-size: 15px;
      font-weight: 700;
      color: #0f1923;
      background: #e8a030;
      padding: 6px 14px;
      border-radius: 3px;
      letter-spacing: 0.5px;
      margin-bottom: 40px;
    }

    .card {
      background: #152030;
      border: 1px solid #1e3a5f;
      border-radius: 6px;
      padding: 48px 56px;
      max-width: 520px;
      width: 100%;
      text-align: center;
    }

    h1 {
      font-size: 28px;
      font-weight: 700;
      color: #f0f0f0;
      margin-bottom: 16px;
      letter-spacing: -0.5px;
    }

    p {
      font-size: 15px;
      color: #888888;
      line-height: 1.7;
      margin-bottom: 12px;
    }

    .divider {
      width: 40px;
      height: 2px;
      background: #e8a030;
      margin: 28px auto;
      border-radius: 2px;
    }

    .contact {
      font-size: 13px;
      color: #666666;
    }

    .contact a {
      color: #e8a030;
      text-decoration: none;
    }

    .contact a:hover {
      text-decoration: underline;
    }

    @media (max-width: 480px) {
      .card { padding: 32px 24px; }
      h1 { font-size: 22px; }
    }
  </style>
</head>
<body>
  <div class="badge">LION PIKE</div>
  <div class="card">
    <h1>We'll be back shortly.</h1>
    <div class="divider"></div>
    <p>Our website is currently undergoing scheduled maintenance.</p>
    <p>We'll be back online shortly. Thank you for your patience.</p>
    <div class="divider"></div>
    <p class="contact">
      In the meantime, reach us at
      <a href="mailto:cs@lionpike.com">cs@lionpike.com</a>
    </p>
  </div>
</body>
</html>
